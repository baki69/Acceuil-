<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<title>Al Mizân</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }

#bg {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover; z-index:0;
}

/* BOUTON ENTRER — zone invisible sur livre doré */
#btn-entrer {
  position:fixed; bottom:8%; left:50%; transform:translateX(-50%);
  width:40%; height:10%;
  background:transparent; border:none; cursor:pointer; z-index:10;
}

/* RETOUR */
#btn-retour {
  position:fixed; top:2%; left:2%;
  background:none; border:none;
  color:#f5df80; font-family:'Cinzel',serif; font-size:18px;
  cursor:pointer; z-index:50;
  text-shadow:0 0 12px #f5df80;
  display:none;
}

/* BOUTONS MODE */
#btn-hadith {
  position:fixed; bottom:19%; left:4%;
  width:42%; height:6%;
  background:transparent; border:none; cursor:pointer; z-index:10; display:none;
}
#btn-lien {
  position:fixed; bottom:19%; right:4%;
  width:42%; height:6%;
  background:transparent; border:none; cursor:pointer; z-index:10; display:none;
}

/* TEXTAREA parchemin */
#ta {
  position:fixed; left:5%; top:72%;
  width:58%; height:9%;
  background:transparent; border:none; outline:none;
  color:#3a2a00; font-family:'Cinzel',serif; font-size:12px;
  resize:none; z-index:10; caret-color:#3a2a00; line-height:1.5;
  display:none;
}

/* BOUTON ANALYSER invisible */
#btn-ana {
  position:fixed; left:9%; top:83%;
  width:52%; height:7%;
  background:transparent; border:none;
  cursor:pointer; opacity:0; z-index:10; display:none;
}

/* INDICATEURS */
.ind {
  position:fixed; right:2%; width:35%; height:7%;
  border-radius:6px; transition:all .5s; z-index:20; display:none;
}
#ia { top:13%; }
#if { top:24%; }
#ii { top:34%; }
.on-a { background:rgba(0,204,102,.15); border:1px solid #00cc66; box-shadow:0 0 20px #00cc66, 0 0 50px #00cc6640; animation:gp 1.4s infinite alternate; }
.on-f { background:rgba(255,153,0,.15);  border:1px solid #ff9900; box-shadow:0 0 20px #ff9900, 0 0 50px #ff990040; animation:gp 1.4s infinite alternate; }
.on-i { background:rgba(204,0,0,.15);    border:1px solid #cc0000; box-shadow:0 0 20px #cc0000, 0 0 50px #cc000040; animation:gp 1.4s infinite alternate; }

/* EXEMPLES */
#exs {
  position:fixed; bottom:2%; left:50%; transform:translateX(-50%);
  display:none; gap:8px; flex-wrap:wrap; justify-content:center; z-index:30;
}
.ex {
  background:rgba(245,223,128,.12); border:1px solid rgba(245,223,128,.4);
  border-radius:20px; padding:5px 14px;
  color:#f5df80; font-family:'Cinzel',serif; font-size:10px; cursor:pointer;
}

/* LOADING */
#load {
  position:fixed; inset:0; z-index:100;
  background:linear-gradient(180deg,#0a0015,#1a0040);
  display:none; flex-direction:column; align-items:center; justify-content:center;
}
#load.on { display:flex; }
#load p {
  font-family:'Cinzel',serif; color:#f5df80;
  font-size:13px; margin-bottom:22px; letter-spacing:2px; opacity:.85;
}
#chain { display:flex; flex-direction:column-reverse; align-items:center; }
.nd {
  background:rgba(245,223,128,.08); border:1px solid rgba(245,223,128,.5);
  border-radius:20px; padding:5px 18px;
  color:#f5df80; font-family:'Cinzel',serif; font-size:11px;
  animation:ng 1.4s infinite alternate;
}
.bm {
  width:2px; height:16px;
  background:linear-gradient(to top,#f5df80,transparent);
  animation:bm 1s infinite;
}

/* POPUP */
#pop {
  position:fixed; inset:0; background:rgba(0,0,0,.88);
  z-index:200; display:none; align-items:center; justify-content:center; padding:20px;
}
#pop.on { display:flex; }
#pbox {
  background:linear-gradient(135deg,#2a1500,#120800);
  border-radius:14px; padding:26px 22px;
  max-width:480px; width:100%;
  font-family:'Cinzel',serif; position:relative;
}
#pverdict { text-align:center; margin-bottom:12px; font-size:22px; font-weight:bold; animation:vp .4s cubic-bezier(.34,1.56,.64,1); }
#pgrade   { background:rgba(245,223,128,.1); border-radius:8px; padding:5px 12px; color:#d4a843; font-size:12px; text-align:center; margin-bottom:12px; }
#pexp     { color:#f5df80; font-size:12px; line-height:1.7; margin-bottom:12px; }
#psrc     { color:#d4a843; font-size:11px; font-style:italic; margin-bottom:12px; }
#pdisc    { border-top:1px solid #3a2a00; padding-top:10px; color:#888; font-size:10px; font-family:sans-serif; line-height:1.5; }
#pcls     { position:absolute; top:10px; right:12px; background:none; border:none; color:#f5df80; font-size:22px; cursor:pointer; }

@keyframes gp { from{opacity:.6} to{opacity:1} }
@keyframes ng { from{box-shadow:0 0 4px rgba(245,223,128,.2)} to{box-shadow:0 0 14px rgba(245,223,128,.9)} }
@keyframes bm { 0%,100%{opacity:.2} 50%{opacity:1} }
@keyframes vp { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<!-- IMAGE FOND -->
<img id="bg" src="https://raw.githubusercontent.com/baki69/Photos-2/refs/heads/main/IMG_20260301_174253.jpg" alt=""/>

<!-- ACCUEIL -->
<button id="btn-entrer" onclick="goVerif()"></button>

<!-- VÉRIFICATEUR -->
<button id="btn-retour" onclick="goAccueil()">← Retour</button>
<div id="ia" class="ind"></div>
<div id="if" class="ind"></div>
<div id="ii" class="ind"></div>
<button id="btn-hadith" onclick="setMode('hadith')"></button>
<button id="btn-lien"   onclick="setMode('lien')"></button>
<textarea id="ta" placeholder="Collez votre hadith ici..."></textarea>
<button id="btn-ana" onclick="analyser()"></button>
<div id="exs">
  <button class="ex" onclick="setEx('Les actions ne valent que par les intentions')">Hadith Niyya</button>
  <button class="ex" onclick="setEx('Cherchez la science même en Chine')">Hadith douteux</button>
  <button class="ex" onclick="setEx('Celui qui se connaît connaît son Seigneur')">Hadith inventé</button>
</div>

<!-- LOADING -->
<div id="load">
  <p>Vérification de la chaîne d'isnâd...</p>
  <div id="chain"></div>
</div>

<!-- POPUP RÉSULTAT -->
<div id="pop">
  <div id="pbox">
    <button id="pcls" onclick="closePop()">×</button>
    <div id="pverdict"></div>
    <div id="pgrade"></div>
    <p  id="pexp"></p>
    <p  id="psrc"></p>
    <div id="pdisc"></div>
  </div>
</div>

<script>
// Construire la chaîne isnâd
const NODES = ["Matn","Compagnon","Transmetteur 1","Transmetteur 2","Transmetteur 3","Transmetteur 4","Collecteur","Muhaddith","Vous"];
const chain = document.getElementById("chain");
NODES.forEach((n,i) => {
  const w = document.createElement("div");
  w.style.cssText = "display:flex;flex-direction:column-reverse;align-items:center";
  const nd = document.createElement("div");
  nd.className = "nd";
  nd.style.animationDelay = (i * .12) + "s";
  nd.textContent = n;
  w.appendChild(nd);
  if (i < NODES.length - 1) {
    const b = document.createElement("div");
    b.className = "bm";
    b.style.animationDelay = (i * .12) + "s";
    w.appendChild(b);
  }
  chain.appendChild(w);
});

let mode = "hadith";

function goVerif() {
  document.getElementById("bg").src = "https://raw.githubusercontent.com/baki69/Photos2/refs/heads/main/1772395163060.png";
  document.getElementById("btn-entrer").style.display = "none";
  ["btn-retour","btn-hadith","btn-lien","ta","btn-ana","ia","if","ii"].forEach(id => {
    document.getElementById(id).style.display = "block";
  });
  document.getElementById("exs").style.display = "flex";
}

function goAccueil() {
  document.getElementById("bg").src = "https://raw.githubusercontent.com/baki69/Photos-2/refs/heads/main/IMG_20260301_174253.jpg";
  document.getElementById("btn-entrer").style.display = "block";
  ["btn-retour","btn-hadith","btn-lien","ta","btn-ana","ia","if","ii","exs"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
  resetInd();
}

function setMode(m) { mode = m; document.getElementById("ta").value = ""; resetInd(); }
function setEx(t)   { document.getElementById("ta").value = t; }
function resetInd() { ["ia","if","ii"].forEach(id => document.getElementById(id).className = "ind"); }

async function analyser() {
  const txt = document.getElementById("ta").value.trim();
  if (!txt) return;
  document.getElementById("load").classList.add("on");
  resetInd();

  const prompt = `Tu es un expert en sciences du hadith. Analyse ce hadith avec rigueur.
Retourne UNIQUEMENT un objet JSON valide, sans markdown, sans backticks :
{"verdict":"AUTHENTIQUE ou FAIBLE ou INVENTÉ","grade":"grade précis","explication":"explication claire en français, max 3 phrases","sources":"références principales","disclaimer":"Cette analyse IA est fournie à titre informatif. Pour toute décision religieuse, consultez un savant qualifié."}
Hadith : ${txt}`;

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const d   = await r.json();
    const raw = (d.content || []).map(b => b.text || "").join("").replace(/```json|```/g,"").trim();
    const j   = JSON.parse(raw);

    document.getElementById("load").classList.remove("on");

    // Allumer indicateur
    const map = { "AUTHENTIQUE":["ia","on-a"], "FAIBLE":["if","on-f"], "INVENTÉ":["ii","on-i"] };
    const m2  = map[j.verdict];
    if (m2) document.getElementById(m2[0]).className = "ind " + m2[1];

    // Remplir popup
    const c = { "AUTHENTIQUE":"#00cc66", "FAIBLE":"#ff9900", "INVENTÉ":"#cc0000" }[j.verdict] || "#f5df80";
    document.getElementById("pbox").style.border     = `2px solid ${c}`;
    document.getElementById("pbox").style.boxShadow  = `0 0 40px ${c}50`;
    document.getElementById("pverdict").textContent  = j.verdict;
    document.getElementById("pverdict").style.color  = c;
    document.getElementById("pverdict").style.textShadow = `0 0 25px ${c}`;
    document.getElementById("pgrade").textContent    = j.grade || "";
    document.getElementById("pexp").textContent      = j.explication || "";
    document.getElementById("psrc").textContent      = j.sources ? "Sources : " + j.sources : "";
    document.getElementById("pdisc").textContent     = "⚠️ " + j.disclaimer;
    document.getElementById("pop").classList.add("on");

  } catch(e) {
    document.getElementById("load").classList.remove("on");
    alert("Erreur lors de l'analyse. Réessayez.");
  }
}

function closePop() { document.getElementById("pop").classList.remove("on"); }
</script>
</body>
</html>
