.bg::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 120%, rgba(0,0,0,0.5) 0%, transparent 60%);
}

.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.p{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100vh);opacity:0;}10%{opacity:0.8;}90%{opacity:0.3;}100%{transform:translateY(-5vh);opacity:0;}}

/* PANEL — petit et centré */
.panel{
  position:fixed;
  bottom:5vh;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  width:min(400px, 88vw);
}

/* SVG ornamental border */
.border-svg{
  position:absolute;
  inset:-12px;
  z-index:3;
  pointer-events:none;
  width:calc(100% + 24px);
  height:calc(100% + 24px);
}

.card{
  position:relative;
  background:rgba(8,3,0,0.82);
  backdrop-filter:blur(28px) saturate(1.3);
  -webkit-backdrop-filter:blur(28px);
  border-radius:12px;
  padding:16px 18px 14px;
  border:1px solid rgba(212,175,55,0.2);
  box-shadow:
    0 12px 50px rgba(0,0,0,0.65),
    0 0 0 1px rgba(212,175,55,0.06),
    inset 0 1px 0 rgba(212,175,55,0.1);
}

/* Tabs */
.tabs{display:flex;gap:5px;margin-bottom:11px;}
.tab{
  flex:1;padding:7px 4px;
  border:1px solid rgba(212,175,55,0.18);
  border-radius:6px;
  background:rgba(212,175,55,0.04);
  color:rgba(212,175,55,0.45);
  font-family:'Cinzel',serif;font-size:9px;
  cursor:pointer;transition:all 0.3s;letter-spacing:1px;text-align:center;
}
.tab.active{
  background:rgba(212,175,55,0.13);
  border-color:rgba(212,175,55,0.45);
  color:#f0d060;
  box-shadow:inset 0 1px 0 rgba(212,175,55,0.12);
}
.tab:hover:not(.active){background:rgba(212,175,55,0.07);color:rgba(212,175,55,0.65);}

/* Search row */
.search-row{display:flex;gap:7px;}
.search-inp{
  flex:1;height:40px;
  background:rgba(0,0,0,0.42);
  border:1px solid rgba(212,175,55,0.22);
  border-radius:8px;
  padding:0 13px;
  color:#f0e8d0;
  font-family:'Crimson Text',serif;font-size:14px;
  outline:none;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.search-inp:focus{border-color:rgba(212,175,55,0.55);box-shadow:0 0 12px rgba(212,175,55,0.08);}
.search-inp::placeholder{color:rgba(200,175,120,0.32);font-style:italic;}

.btn-go{
  height:40px;padding:0 16px;
  background:linear-gradient(135deg,#7a5000,#d4af37,#f0d060,#d4af37,#7a5000);
  background-size:300% auto;
  border:none;border-radius:8px;
  color:#1a0800;
  font-family:'Cinzel Decorative',cursive;font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:1px;
  animation:shimmer 3s linear infinite;
  box-shadow:0 4px 14px rgba(0,0,0,0.5),0 0 10px rgba(212,175,55,0.12);
  transition:transform 0.2s,box-shadow 0.2s;
  white-space:nowrap;
}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,0.6),0 0 18px rgba(212,175,55,0.28);}
.btn-go:active{transform:translateY(0);}
.btn-go:disabled{opacity:0.55;cursor:not-allowed;transform:none;}
@keyframes shimmer{from{background-position:0% center;}to{background-position:300% center;}}

/* Spinner */
.loading{display:none;text-align:center;padding:12px 0 4px;}
.loading.show{display:block;}
.spinner{width:24px;height:24px;border:2px solid rgba(212,175,55,0.15);border-top-color:#d4af37;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:rgba(212,175,55,0.6);}

/* Result */
.result{display:none;margin-top:10px;border-radius:8px;overflow:hidden;}
.result.show{display:block;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.res-hdr{padding:10px 12px;display:flex;align-items:center;gap:8px;}
.res-grade{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:1px;}
.res-sub{font-size:9px;opacity:0.7;margin-top:2px;font-family:'Cinzel',serif;letter-spacing:1px;}
.res-body{padding:10px 12px;background:rgba(0,0,0,0.5);font-size:12px;line-height:1.75;white-space:pre-wrap;color:#f0e8d0;max-height:130px;overflow-y:auto;}
.res-acts{display:flex;gap:4px;padding:7px 10px;background:rgba(0,0,0,0.35);}
.res-btn{flex:1;padding:6px;border:1px solid rgba(212,175,55,0.28);border-radius:5px;background:rgba(212,175,55,0.06);color:rgba(212,175,55,0.7);font-size:9px;cursor:pointer;transition:all 0.2s;text-align:center;text-decoration:none;display:block;font-family:'Cinzel',serif;letter-spacing:1px;}
.res-btn:hover{background:rgba(212,175,55,0.17);color:#f0d060;}
.v-sahih{background:linear-gradient(135deg,rgba(16,80,35,0.65),rgba(10,55,20,0.65));border:1px solid rgba(34,197,94,0.4);}
.v-daif{background:linear-gradient(135deg,rgba(120,75,0,0.65),rgba(90,55,0,0.65));border:1px solid rgba(212,150,0,0.4);}
.v-mawdu{background:linear-gradient(135deg,rgba(100,15,15,0.65),rgba(70,8,8,0.65));border:1px solid rgba(200,40,40,0.4);}
.v-inconnu{background:linear-gradient(135deg,rgba(50,50,90,0.65),rgba(35,35,65,0.65));border:1px solid rgba(120,120,180,0.4);}

.err{display:none;padding:8px 12px;background:rgba(160,15,15,0.25);border:1px solid rgba(200,40,40,0.3);border-radius:6px;font-size:11px;color:#fca5a5;margin-top:8px;}
.err.show{display:block;}

/* API dot */
.api-dot{position:fixed;top:14px;right:14px;z-index:50;display:flex;align-items:center;gap:6px;background:rgba(6,2,0,0.78);border:1px solid rgba(212,175,55,0.22);border-radius:20px;padding:6px 12px;font-family:'Cinzel',serif;font-size:9px;color:rgba(212,175,55,0.65);cursor:pointer;letter-spacing:1px;transition:all 0.3s;}
.api-dot:hover{border-color:rgba(212,175,55,0.5);color:#f0d060;}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;}
.dot.on{background:#22c55e;}.dot.off{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.show{display:flex;}
.modal{background:linear-gradient(160deg,rgba(22,10,0,0.99),rgba(14,5,0,0.99));border:1px solid rgba(212,175,55,0.3);border-radius:12px;padding:24px;max-width:320px;width:100%;position:relative;box-shadow:0 0 60px rgba(0,0,0,0.9);}
.modal-title{font-family:'Cinzel Decorative',cursive;font-size:15px;color:#f0d060;margin-bottom:8px;}
.modal-desc{font-size:12px;color:rgba(232,220,200,0.75);margin-bottom:14px;line-height:1.6;}
.modal-inp{width:100%;padding:11px 13px;background:rgba(0,0,0,0.55);border:1px solid rgba(212,175,55,0.22);border-radius:7px;color:#f0e8d0;font-size:13px;outline:none;margin-bottom:11px;}
.modal-inp:focus{border-color:rgba(212,175,55,0.5);}
.btn-save{width:100%;padding:11px;background:linear-gradient(135deg,#7a5500,#d4af37,#f0d060);border:none;border-radius:7px;color:#1a0800;font-family:'Cinzel Decorative',cursive;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all 0.3s;}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(212,175,55,0.35);}

@media(max-width:430px){
  .tabs{gap:3px;}
  .tab{font-size:8px;padding:6px 3px;}
  .btn-go{font-size:10px;padding:0 12px;}
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="particles" id="ptcl"></div>

<div class="api-dot" onclick="openModal()">
  <div class="dot" id="dot"></div>
  <span id="stTxt">API</span>
</div>

<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-title">Cle API Gemini</div>
    <div class="modal-desc">Entrez votre cle Google AI Studio.<br>Stockee sur votre appareil uniquement.<br><br><a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#d4af37;">Obtenir une cle gratuite</a></div>
    <input type="password" class="modal-inp" id="apiInp" placeholder="AIza..." autocomplete="off">
    <button class="btn-save" onclick="saveKey()">ENREGISTRER</button>
  </div>
</div>

<div class="panel">

  <!-- SVG ornamental border -->
  <svg class="border-svg" viewBox="0 0 424 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
        <stop offset="30%" stop-color="#d4af37" stop-opacity="0.8"/>
        <stop offset="50%" stop-color="#f0d060" stop-opacity="1"/>
        <stop offset="70%" stop-color="#d4af37" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
        <stop offset="30%" stop-color="#d4af37" stop-opacity="0.8"/>
        <stop offset="50%" stop-color="#f0d060" stop-opacity="1"/>
        <stop offset="70%" stop-color="#d4af37" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Main border lines -->
    <rect x="12" y="12" width="400" height="96" rx="10" ry="10"
      fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.7"/>

    <!-- Top horizontal line -->
    <line x1="40" y1="12" x2="384" y2="12" stroke="url(#g1)" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Bottom horizontal line -->
    <line x1="40" y1="108" x2="384" y2="108" stroke="url(#g1)" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Left vertical line -->
    <line x1="12" y1="30" x2="12" y2="90" stroke="url(#g2)" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Right vertical line -->
    <line x1="412" y1="30" x2="412" y2="90" stroke="url(#g2)" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Corner diamonds -->
    <g filter="url(#glow)">
      <!-- TL -->
      <rect x="6" y="6" width="12" height="12" rx="2" fill="#d4af37" opacity="0.9" transform="rotate(45 12 12)"/>
      <!-- TR -->
      <rect x="406" y="6" width="12" height="12" rx="2" fill="#d4af37" opacity="0.9" transform="rotate(45 412 12)"/>
      <!-- BL -->
      <rect x="6" y="102" width="12" height="12" rx="2" fill="#d4af37" opacity="0.9" transform="rotate(45 12 108)"/>
      <!-- BR -->
      <rect x="406" y="102" width="12" height="12" rx="2" fill="#d4af37" opacity="0.9" transform="rotate(45 412 108)"/>
    </g>

    <!-- Corner arabesques TL -->
    <path d="M12,30 Q12,12 30,12" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
    <path d="M12,36 Q6,24 18,18 Q24,12 36,12" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.5"/>
    <!-- Corner arabesques TR -->
    <path d="M412,30 Q412,12 394,12" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
    <path d="M412,36 Q418,24 406,18 Q400,12 388,12" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.5"/>
    <!-- Corner arabesques BL -->
    <path d="M12,90 Q12,108 30,108" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
    <path d="M12,84 Q6,96 18,102 Q24,108 36,108" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.5"/>
    <!-- Corner arabesques BR -->
    <path d="M412,90 Q412,108 394,108" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
    <path d="M412,84 Q418,96 406,102 Q400,108 388,108" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.5"/>

    <!-- Mid decorations top -->
    <circle cx="212" cy="12" r="3" fill="#f0d060" filter="url(#glow)"/>
    <circle cx="180" cy="12" r="1.5" fill="#d4af37" opacity="0.7"/>
    <circle cx="244" cy="12" r="1.5" fill="#d4af37" opacity="0.7"/>
    <!-- Mid decorations bottom -->
    <circle cx="212" cy="108" r="3" fill="#f0d060" filter="url(#glow)"/>
    <circle cx="180" cy="108" r="1.5" fill="#d4af37" opacity="0.7"/>
    <circle cx="244" cy="108" r="1.5" fill="#d4af37" opacity="0.7"/>

    <!-- Inner subtle frame -->
    <rect x="18" y="18" width="388" height="84" rx="8" ry="8"
      fill="none" stroke="#d4af37" stroke-width="0.4" opacity="0.25"/>
  </svg>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="setTab('hadith',this)">Verifier hadith</div>
      <div class="tab" onclick="setTab('pred',this)">Verifier predicateur</div>
      <div class="tab" onclick="setTab('strict',this)">Mode Strict</div>
    </div>
    <div class="search-row">
      <input class="search-inp" id="sinp" placeholder="Collez un hadith ici..." maxlength="1000">
      <button class="btn-go" id="btnGo" onclick="analyser()">ANALYSER</button>
    </div>
    <div class="loading" id="load"><div class="spinner"></div><div class="load-txt" id="loadTxt">CONSULTATION DES SOURCES...</div></div>
    <div class="err" id="err"></div>
    <div class="result" id="res">
      <div class="res-hdr" id="resHdr"><div><div class="res-grade" id="resGrade"></div><div class="res-sub" id="resSub"></div></div></div>
      <div class="res-body" id="resBody"></div>
      <div class="res-acts">
        <button class="res-btn" onclick="copyRes()">Copier</button>
        <button class="res-btn" onclick="shareWA()">WhatsApp</button>
        <a class="res-btn" id="resLnk" href="https://dorar.net" target="_blank">Verifier</a>
        <a class="res-btn" href="https://islamqa.info/fr" target="_blank">Savant</a>
      </div>
    </div>
  </div>
</div>

<script>
var apiKey=localStorage.getItem("mz_k")||"";
var mode="hadith";
window.onload=function(){updateStatus();mkParticles();if(!apiKey)openModal();};

function mkParticles(){var c=document.getElementById("ptcl");for(var i=0;i<10;i++){var p=document.createElement("div");p.className="p";var s=1.5+Math.random()*2;p.style.cssText="left:"+Math.random()*100+"%;width:"+s+"px;height:"+s+"px;background:rgba(212,175,55,"+(0.5+Math.random()*0.4)+");animation-duration:"+(12+Math.random()*14)+"s;animation-delay:"+(Math.random()*12)+"s";c.appendChild(p);}}

function openModal(){document.getElementById("modal").className="modal-ov show";}
function saveKey(){var k=document.getElementById("apiInp").value.trim();if(!k)return;apiKey=k;localStorage.setItem("mz_k",k);updateStatus();document.getElementById("modal").className="modal-ov";}
function updateStatus(){document.getElementById("dot").className="dot "+(apiKey?"on":"off");document.getElementById("stTxt").textContent=apiKey?"IA Active":"Config API";}

function setTab(m,btn){
  mode=m;
  document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");
  var inp=document.getElementById("sinp");
  if(m==="pred") inp.placeholder="Nom du predicateur (ex: Tariq Ramadan...)";
  else if(m==="strict") inp.placeholder="Mode Strict — base certifiee uniquement...";
  else inp.placeholder="Collez un hadith ici...";
  hideRes();hideErr();
}

var MSGS=["CONSULTATION DES SOURCES...","VERIFICATION AD-DAIFA...","ANALYSE DE L'ISNAD...","COMPARAISON DES SOURCES..."];
var mi=0,mt=null;
function showLoad(){document.getElementById("load").className="loading show";mt=setInterval(function(){mi=(mi+1)%MSGS.length;document.getElementById("loadTxt").textContent=MSGS[mi];},1500);}
function hideLoad(){document.getElementById("load").className="loading";clearInterval(mt);}
function showErr(m){var e=document.getElementById("err");e.textContent=m;e.className="err show";}
function hideErr(){document.getElementById("err").className="err";}
function hideRes(){document.getElementById("res").className="result";}

var DB=[
  {t:"les actions ne valent que par les intentions",g:"SAHIH",r:"Bukhari n.1, Muslim n.1907",e:"Premier hadith du Sahih Al-Bukhari. Pilier de la jurisprudence islamique.",l:"https://sunnah.com/bukhari:1"},
  {t:"sourire a ton frere est une sadaqa",g:"SAHIH",r:"Tirmidhi n.1956",e:"Hadith authentique. Le sourire est recompense par Allah.",l:"https://sunnah.com/tirmidhi:1956"},
  {t:"parle bien ou tais-toi",g:"SAHIH",r:"Bukhari n.6018, Muslim n.47",e:"Principe fondamental du comportement du croyant.",l:"https://sunnah.com/bukhari:6018"},
  {t:"cherche la science meme en chine",g:"MAWDU",r:"Ad-Daifa Al-Albani n.416",e:"INVENTE. Narrateur Abu Atika juge menteur. Authentique : Chercher la science est une obligation (Ibn Majah n.224).",l:"https://dorar.net"},
  {t:"le mariage est la moitie de la religion",g:"MAWDU",r:"Ad-Daifa Al-Albani n.4",e:"INVENTE. Chaine brisee. Al-Albani : tres faible voire invente.",l:"https://dorar.net"},
  {t:"l amour de la patrie fait partie de la foi",g:"MAWDU",r:"Ad-Daifa Al-Albani n.36",e:"INVENTE. Al-Albani : sans fondement. Contredit Coran 49:13.",l:"https://dorar.net"},
  {t:"le paradis est sous les pieds des meres",g:"DAIF",r:"Ad-Daifa Al-Albani - faible",e:"FAIBLE. Utiliser : Ta mere, ta mere, ta mere puis ton pere (Bukhari n.5971).",l:"https://dorar.net"}
];
var PDB={"tariq ramadan":{v:"MAWDU",r:"Graves mises en garde",e:"Aucune formation islamique. Aucune ijaza. Refute par Al-Fawzan et Rabi Al-Madkhali."},"rachid abou houdeyfa":{v:"MAWDU",r:"Graves mises en garde",e:"Autodidacte. A insulte Ibn Baz et Ibn Uthaymin publiquement."},"rachid eljay":{v:"DAIF",r:"A eviter",e:"Formation non documentee. Contradictions methodologiques."},"zakir naik":{v:"MAWDU",r:"Graves mises en garde",e:"Medecin — pas savant islamique. Aucune ijaza."},"al-albani":{v:"SAHIH",r:"Recommande",e:"Maitre du hadith au XXe siecle. Recommande par Ibn Baz et Ibn Uthaymin."},"ibn baz":{v:"SAHIH",r:"Recommande",e:"Grand Mufti d'Arabie Saoudite. binbaz.org.sa"},"ibn uthaymin":{v:"SAHIH",r:"Recommande",e:"Pedagogue exceptionnel. ibnothaimeen.com"}};

var GH={SAHIH:{cls:"v-sahih",l:"SAHIH — Authentique"},HASAN:{cls:"v-sahih",l:"HASAN — Bon"},DAIF:{cls:"v-daif",l:"DAIF — Faible"},MAWDU:{cls:"v-mawdu",l:"MAWDU — INVENTE"},INCONNU:{cls:"v-inconnu",l:"Inconnu"}};
var GP={SAHIH:{cls:"v-sahih",l:"RECOMMANDE"},DAIF:{cls:"v-daif",l:"A EVITER"},MAWDU:{cls:"v-mawdu",l:"GRAVES MISES EN GARDE"},INCONNU:{cls:"v-inconnu",l:"Non documente"}};

function showRes(grade,ref,body,lnk,isPred){var G=isPred?GP:GH;var g=G[grade]||G.INCONNU;document.getElementById("resHdr").className="res-hdr "+g.cls;document.getElementById("resGrade").textContent=g.l;document.getElementById("resSub").textContent=ref;document.getElementById("resBody").textContent=body;if(lnk)document.getElementById("resLnk").href=lnk;document.getElementById("res").className="result show";}
function dg(t){var u=t.toUpperCase();if(u.includes("MAWDU")||u.includes("INVENTE")||u.includes("GRAVES"))return "MAWDU";if(u.includes("DAIF")||u.includes("FAIBLE")||u.includes("A EVITER"))return "DAIF";if(u.includes("HASAN"))return "HASAN";if(u.includes("SAHIH")||u.includes("AUTHENTIQUE")||u.includes("RECOMMANDE"))return "SAHIH";return "INCONNU";}

async function analyser(){
  var txt=document.getElementById("sinp").value.trim();
  if(!txt){showErr("Veuillez entrer un texte.");return;}
  hideErr();hideRes();showLoad();
  document.getElementById("btnGo").disabled=true;
  try{
    if(mode==="pred"){
      var nom=txt.toLowerCase();var found=null;
      for(var k in PDB){if(nom.includes(k.split(" ")[0])||k.includes(nom.split(" ")[0])){found=PDB[k];break;}}
      if(found){hideLoad();document.getElementById("btnGo").disabled=false;showRes(found.v,found.r,found.e,null,true);return;}
      if(!apiKey){hideLoad();document.getElementById("btnGo").disabled=false;showErr("Cle API requise.");openModal();return;}
      var r=await gem("Analyse : "+txt+"
## IDENTITE
## FORMATION [ou Aucune documentee]
## IJAZA [ou Aucune]
## RECOMMANDATIONS SAVANTS
## CRITIQUES SAVANTS
## VERDICT [RECOMMANDE/A EVITER/GRAVES MISES EN GARDE]
## CONSEIL
Jamais Salafi. Salaf as-Salih.");
      hideLoad();document.getElementById("btnGo").disabled=false;showRes(dg(r),"Analyse IA — Consultez un savant",r,null,true);
    } else {
      var q=txt.toLowerCase().replace(/[^a-z\s]/g,"").trim();
      var local=DB.find(function(h){return q.length>8&&h.t.includes(q.substring(0,16));});
      if(local){hideLoad();document.getElementById("btnGo").disabled=false;showRes(local.g,"Source certifiee : "+local.r,"Reference : "+local.r+"

"+local.e,local.l,false);return;}
      if(mode==="strict"){hideLoad();document.getElementById("btnGo").disabled=false;showRes("INCONNU","Mode Strict — non trouve","Non trouve en base locale.
Consultez dorar.net ou sunnah.com","https://dorar.net",false);return;}
      if(!apiKey){hideLoad();document.getElementById("btnGo").disabled=false;showErr("Cle API requise.");openModal();return;}
      var r2=await gem("Tu es MiZan, expert hadith Salaf as-Salih.
Analyse : "+txt+"
Si pas de ref PRECISE : Reference non trouvee.
## VERDICT [SAHIH/HASAN/DAIF/MAWDU/INCONNU]
## REFERENCE PRECISE
## ANALYSE
## AVIS [Al-Albani Ad-Daifa n.X]
## ALTERNATIF [si faible]
## CONCLUSION
Jamais Salafi.");
      hideLoad();document.getElementById("btnGo").disabled=false;showRes(dg(r2),"Analyse IA — Consultez un savant",r2,"https://dorar.net",false);
    }
  }catch(e){hideLoad();document.getElementById("btnGo").disabled=false;showErr("Erreur : "+e.message);}
}

async function gem(prompt){
  var r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:2000}})});
  if(!r.ok){var e=await r.json();throw new Error(e?.error?.message||"Erreur "+r.status);}
  var d=await r.json();return d?.candidates?.[0]?.content?.parts?.[0]?.text||"";
}
function copyRes(){navigator.clipboard.writeText(document.getElementById("resBody").textContent).then(function(){alert("Copie!");});}
function shareWA(){window.open("https://wa.me/?text="+encodeURIComponent("Verification MiZan:

"+document.getElementById("resBody").textContent.substring(0,500)));}
</script>
</body>
</html>
